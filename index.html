<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
</head>
<body>
    <section>
        <h1> Celsius to Fahrenheit </h1>

        <input type="number" id="C-to-F"> <br>
        <input type="number" id="F-from-C"> <br>

        <p id="C-to-F-display"></p>
    </section>
    <section>
        <h1> Fahrenheit to Celsius </h1>

        <input type="number" id="F-to-C"> <br>
        <input type="number" id="C-from-F"> <br>

        <p id="F-to-C-display"></p>
    </section>
</body>
</html>
